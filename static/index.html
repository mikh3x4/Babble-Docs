<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babbel Docs</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 800px; margin: 0 auto; padding: 2rem;
            background: #f5f5f5;
        }
        header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; color: #333; }
        select, button {
            padding: 0.5rem 1rem; font-size: 1rem;
            border: 1px solid #ccc; border-radius: 4px;
            margin-left: 0.5rem;
        }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }

        #editor {
            width: 100%; min-height: 400px; padding: 1rem;
            font-size: 1rem; line-height: 1.6;
            border: 2px solid #ddd; border-radius: 8px;
            background: white; resize: vertical;
            font-family: inherit;
        }
        #editor:focus { outline: none; border-color: #007bff; }

        #status {
            margin-top: 0.5rem; padding: 0.5rem;
            font-size: 0.875rem; color: #666;
        }
        .connected { color: #28a745; }
        .disconnected { color: #dc3545; }

        /* Syncing indicator - always visible when active */
        #syncing {
            position: fixed; top: 1rem; right: 1rem;
            padding: 0.75rem 1.5rem; border-radius: 4px;
            background: #ff6b00; color: white;
            font-weight: bold; font-size: 1rem;
            display: none; z-index: 9999;
            animation: pulse 1s ease-in-out infinite;
        }
        #syncing.active { display: block; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* Pending translation highlight */
        .pending {
            background: #ffcccc; color: #cc0000;
            padding: 2px 4px; border-radius: 2px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Babbel Docs</h1>
        <div>
            <span id="clients">0 users</span>
            <select id="language">
                <option value="en">English</option>
                <option value="pl">Polski</option>
                <option value="zh">中文</option>
            </select>
        </div>
    </header>

    <textarea id="editor" placeholder="Start typing..."></textarea>

    <div id="status" class="disconnected">Disconnected</div>
    <div id="syncing">Syncing...</div>

    <script>
        const editor = document.getElementById('editor');
        const langSelect = document.getElementById('language');
        const statusEl = document.getElementById('status');
        const clientsEl = document.getElementById('clients');
        const syncingEl = document.getElementById('syncing');

        let ws = null;
        let currentLang = 'en';
        let debounceTimer = null;
        let lastSentText = '';
        let pendingBlocks = {};  // {index: {text, sourceLang}}

        const connect = () => {
            ws = new WebSocket(`ws://${location.host}/ws`);

            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connected';
                ws.send(JSON.stringify({ type: 'load', language: currentLang }));
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected - reconnecting...';
                statusEl.className = 'disconnected';
                setTimeout(connect, 2000);
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                console.log('Received:', msg);

                if (msg.type === 'doc' && msg.lang === currentLang) {
                    editor.value = msg.text;
                    lastSentText = msg.text;
                    pendingBlocks = {};  // Clear pending on full doc update
                }

                if (msg.type === 'clients') {
                    clientsEl.textContent = `${msg.count} user${msg.count !== 1 ? 's' : ''}`;
                }

                if (msg.type === 'syncing') {
                    if (msg.active) {
                        syncingEl.classList.add('active');
                    } else {
                        syncingEl.classList.remove('active');
                        pendingBlocks = {};
                    }
                }

                if (msg.type === 'pending') {
                    // Show original text (will be replaced when translation arrives)
                    pendingBlocks[msg.index] = { text: msg.text, sourceLang: msg.source_lang };
                    // Insert the pending text into editor at the right position
                    insertPendingText(msg.index, msg.text);
                }
            };
        };

        // Insert pending (untranslated) text at sentence index
        const insertPendingText = (index, text) => {
            const sentences = splitSentences(editor.value);
            while (sentences.length <= index) {
                sentences.push('');
            }
            // Mark it visually by wrapping (we'll use a simple marker)
            sentences[index] = `[PENDING: ${text}]`;
            editor.value = sentences.join('. ');
            lastSentText = editor.value;
        };

        // Simple sentence splitter (matches backend logic)
        const splitSentences = (text) => {
            if (!text.trim()) return [];
            // Split on . ! ? or newlines
            return text.split(/[.!?\n]+/).map(s => s.trim()).filter(s => s);
        };

        // Send update when user stops typing
        editor.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const text = editor.value;
                if (text !== lastSentText && ws?.readyState === WebSocket.OPEN) {
                    console.log('Sending update');
                    ws.send(JSON.stringify({
                        type: 'update',
                        lang: currentLang,
                        text: text
                    }));
                    lastSentText = text;
                }
            }, 500);
        });

        // Language switching
        langSelect.addEventListener('change', () => {
            currentLang = langSelect.value;
            if (ws?.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'load', language: currentLang }));
            }
        });

        connect();
    </script>
</body>
</html>
