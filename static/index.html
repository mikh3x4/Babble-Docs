<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Babbel Docs</title>
  <link rel="stylesheet" href="/static/vendor/prosemirror.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-head">
      <h1>Babbel Docs</h1>
      <button id="new-doc" title="New document">+</button>
    </div>
    <ul id="doc-list"></ul>
    <div class="sidebar-foot">
      <span id="conn-dot" class="dot"></span><span id="conn-text">Connecting…</span>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <input id="doc-title" placeholder="Untitled" autocomplete="off">
      <div class="topbar-right">
        <span id="cost" title="Claude translation cost for this document" hidden></span>
        <span id="presence" title="Connected users"></span>
        <span id="translating" hidden>Translating…</span>
        <select id="lang-select" title="Language"></select>
        <button id="add-lang" title="Add a language">+ lang</button>
        <button id="export-pdf" title="Export this language as PDF">PDF</button>
      </div>
    </header>

    <div id="add-lang-panel" hidden>
      <input id="add-lang-input" list="lang-catalog" placeholder="Language (e.g. Spanish or es)">
      <datalist id="lang-catalog"></datalist>
      <button id="add-lang-confirm">Add</button>
      <button id="add-lang-cancel">Cancel</button>
    </div>

    <div id="toolbar">
      <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
      <button data-cmd="strike" title="Strikethrough"><s>S</s></button>
      <button data-cmd="code" title="Inline code">&lt;&gt;</button>
      <button data-cmd="link" title="Link">🔗</button>
      <span class="sep"></span>
      <button data-cmd="paragraph" title="Paragraph">¶</button>
      <button data-cmd="h1" title="Heading 1">H1</button>
      <button data-cmd="h2" title="Heading 2">H2</button>
      <button data-cmd="h3" title="Heading 3">H3</button>
      <span class="sep"></span>
      <button data-cmd="bullet" title="Bullet list">•≡</button>
      <button data-cmd="ordered" title="Numbered list">1≡</button>
      <button data-cmd="quote" title="Blockquote">❝</button>
      <button data-cmd="codeblock" title="Code block">{ }</button>
      <span class="sep"></span>
      <button data-cmd="undo" title="Undo (Ctrl+Z)">↺</button>
      <button data-cmd="redo" title="Redo (Ctrl+Y)">↻</button>
    </div>

    <div id="editor-scroll"><div id="editor"></div></div>

    <div id="empty-state" hidden>
      <p>No document selected.</p>
      <button id="empty-create">Create a document</button>
    </div>
  </main>

  <div id="toast" hidden></div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
